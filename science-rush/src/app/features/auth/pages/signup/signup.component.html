<div class="auth-layout">
  
  <div class="auth-card">
    
    <div class="mascot-wrapper">
      <app-mascot emotion="neutral" class="auth-mascot"></app-mascot>
    </div>
    
    <h1>Join the Lab!</h1>
    <p class="subtitle">Start your scientific adventure today.</p>
    
    <form [formGroup]="signupForm">
      
      <div class="input-wrapper">
        <input 
          type="text" 
          placeholder="Full Name" 
          class="game-input"
          [class.invalid]="signupForm.get('fullName')?.invalid && signupForm.get('fullName')?.touched"
          formControlName="fullName">
      </div>

      <div class="input-wrapper">
        <input 
          type="email" 
          placeholder="Email Address" 
          class="game-input"
          [class.invalid]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
          formControlName="email">
      </div>
      
      <div class="input-wrapper">
        <input 
          type="password" 
          placeholder="Create Password (Min 6 chars)" 
          class="game-input"
          [class.invalid]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
          formControlName="password">
      </div>

      <div class="input-wrapper">
        <select class="game-input" formControlName="stream">
          <option value="Science">Science Stream</option>
          <option value="Arts">Arts Stream</option>
          <option value="Commerce">Commerce Stream</option>
        </select>
      </div>
      
      <div class="input-wrapper">
        <input 
          type="text" 
          placeholder="Your District" 
          class="game-input"
          [class.invalid]="signupForm.get('district')?.invalid && signupForm.get('district')?.touched"
          formControlName="district">
      </div>

    </form>

    <app-button 
      [label]="isLoading ? 'CREATING...' : 'START ADVENTURE'"
      type="primary" 
      [fullWidth]="true" 
      [disabled]="isLoading"
      (btnClick)="onSignup()">
    </app-button>

    <div class="footer">
      <span>Already have an account?</span>
      <a routerLink="/auth/login">Log in</a>
    </div>

  </div>
</div>

<app-popup 
  [isVisible]="popup.isVisible"
  [title]="popup.title"
  [message]="popup.message"
  [type]="popup.type"
  (close)="onPopupClose()">
</app-popup>
