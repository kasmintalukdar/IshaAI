<div class="node-wrapper" [ngClass]="{ 'locked': status === 'LOCKED', 'completed': progress >= 100 }">
  
  <div class="crown" *ngIf="progress >= 100">👑</div>

  <div class="ring-container">
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle 
        cx="60" cy="60" r="45" 
        fill="none" 
        stroke="#e5e5e5" 
        stroke-width="12" 
        stroke-linecap="round" />

      <circle 
        class="progress-arc"
        cx="60" cy="60" r="45" 
        fill="none" 
        [attr.stroke]="status === 'LOCKED' ? '#ccc' : '#ffc800'" 
        stroke-width="12" 
        stroke-linecap="round"
        [style.strokeDasharray]="circumference"
        [style.strokeDashoffset]="strokeDashoffset" />
    </svg>

    <button class="node-btn" [disabled]="status === 'LOCKED'">
      <img [src]="icon" alt="Topic Icon" class="icon-img">
    </button>
  </div>

  <div class="node-label">
    {{ title }}
  </div>

</div>
