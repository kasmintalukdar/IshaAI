<div class="skills-card">
  <ng-container *ngIf="skills$ | async as skills">

    <div *ngIf="skills.length === 0" class="empty-state">
      <p>Solve questions to see your cognitive depth analysis.</p>
    </div>

    <div *ngFor="let item of skills" class="skill-row">
      <div class="skill-label" [title]="item.skill">
        {{ item.skill || 'Unknown' }}
      </div>
      <div class="skill-track">
        <div class="skill-fill"
             [style.width.%]="item.percentage || 0"
             [style.backgroundColor]="getColor(item.percentage)">
        </div>
      </div>
      <div class="skill-value">
        {{ item.percentage | number:'1.0-0' }}%
      </div>
    </div>

  </ng-container>
</div>
