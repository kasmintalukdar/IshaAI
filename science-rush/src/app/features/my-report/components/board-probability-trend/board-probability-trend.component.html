<div class="chart-wrapper" #container>
  <div class="momentum-card">

    <div class="card-header">
      <span class="fire-icon">&#x1F525;</span>
      <h3 class="title">BOARD MOMENTUM</h3>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!isLoading && !hasData">
      <p class="empty-msg">No activity recorded yet. Start practicing to see your trend!</p>
    </div>

    <!-- Data State -->
    <ng-container *ngIf="hasData">
      <div class="stats-row">
        <div class="stat-group left">
          <div class="big-value">{{ trendData.length }} weeks</div>
          <div class="sub-label">Tracking Period</div>
        </div>

        <div class="stat-group right">
          <div class="big-value colored" [class.positive]="gainValue >= 0" [class.negative]="gainValue < 0">
            {{ gainValue >= 0 ? '+' : '' }}{{ gainValue }}%
          </div>
          <div class="sub-label">This Week's Gain</div>
        </div>
      </div>

      <div class="chart-area" #chartContainer>
        <div class="loading-overlay" *ngIf="isLoading">
          <div class="spinner"></div>
        </div>

        <svg *ngIf="!isLoading" [attr.width]="chartWidth" [attr.height]="chartHeight" class="bar-chart">
          <line [attr.x1]="0" [attr.y1]="chartHeight - 10"
                [attr.x2]="chartWidth" [attr.y2]="chartHeight - 10"
                stroke="#334155" stroke-width="2" stroke-dasharray="6 6" />

          <g *ngFor="let bar of bars" class="bar-group">
            <rect [attr.x]="bar.x"
                  [attr.y]="bar.y"
                  [attr.width]="bar.width"
                  [attr.height]="bar.height"
                  rx="4" ry="4"
                  [attr.fill]="bar.isCurrent ? '#4ade80' : '#334155'"
                  class="bar-rect" />
            <title>{{ bar.data.weekLabel }}: {{ bar.data.probability }}%</title>
          </g>
        </svg>
      </div>
    </ng-container>

  </div>
</div>
