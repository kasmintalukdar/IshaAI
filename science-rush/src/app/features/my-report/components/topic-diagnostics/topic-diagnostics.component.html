

  <app-premium-lock title="My Locked Chart" 
  (unlock)="onUnlockClicked()">
  
   


  <div class="table-responsive">
    <table *ngIf="diagnostics$ | async as rows">
      <thead>
        <tr>
          <th>Topic</th>
          <th>Accuracy</th>
          <th>Time / Q</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td class="topic-name">{{ row.topic }}</td>
          <td>
            <div class="progress-wrapper">
              <div class="progress-track">
                <div class="progress-fill" [style.width.%]="row.accuracy"></div>
              </div>
              <span class="val">{{ row.accuracy | number:'1.0-0' }}%</span>
            </div>
          </td>
          <td class="time-val">{{ row.timeTaken | number:'1.0-0' }}s</td>
          <td>
            <span class="badge" [ngClass]="row.status.toLowerCase()">
              {{ row.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  </app-premium-lock>
