<div class="root-cause-container">

  <div class="loading-state" *ngIf="isLoading">
    <div class="spinner"></div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading && totalErrors === 0">
    <p>No errors detected yet. Keep solving questions to get your error analysis.</p>
  </div>

  <!-- Data State -->
  <ng-container *ngIf="!isLoading && totalErrors > 0">
    <div class="summary-stat">
      <span class="total-count">{{ totalErrors }}</span>
      <span class="total-label">Total Errors Detected</span>
    </div>

    <div class="cause-list">
      <div class="cause-item" *ngFor="let item of rootCauses">
        <div class="item-header">
          <span class="label">{{ item.label }}</span>
          <span class="value">
            <span class="count">{{ item.count }}</span>
            <span class="percentage">({{ item.percentage }}%)</span>
          </span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"
               [style.width]="getBarWidth(item.percentage)"
               [style.background-color]="item.color">
          </div>
        </div>
      </div>
    </div>
  </ng-container>

</div>
