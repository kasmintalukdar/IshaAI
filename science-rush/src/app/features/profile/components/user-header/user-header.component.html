<div class="profile-header" *ngIf="profileInfo$ | async as profile">

  <div class="header-actions">
    <button class="action-btn" (click)="openSettings()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div class="streak-badge" [class.active]="(profile?.gamification?.streak || 0) > 0">
    <img src="assets/images/ui/fire.svg" alt="Streak">
    <span>{{ profile?.gamification?.streak || 0 }}</span>
  </div>

  <div class="avatar-section">
    <div class="avatar-circle">
      <img 
        [src]="profile.avatar || defaultAvatar" 
        (error)="handleImageError($event)" 
        alt="User Avatar"
      >
      
      <button class="edit-btn" (click)="openEditModal()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </button>
    </div>
  </div>

  <h1 class="user-name">{{ profile.name || 'Science Student' }}</h1>
  <p class="user-login">{{ profile.email }}</p>
  
  <div class="join-date">Joined December 2025</div>

  <app-edit-profile-modal
    *ngIf="showEditModal"
    [user]="profile"
    (close)="showEditModal = false"
    (save)="handleSaveProfile($event)"
  ></app-edit-profile-modal>

  <app-settings-modal
    *ngIf="showSettings"
    (close)="showSettings = false"
    (openEdit)="openEditFromSettings()"
    (logout)="onLogoutClick()"
  ></app-settings-modal>

  <div class="logout-modal-overlay" *ngIf="showLogoutModal" (click)="cancelLogout()">
    <div class="logout-card" (click)="$event.stopPropagation()">
      <h3>Log Out?</h3>
      <div class="logout-actions">
        <button class="btn-cancel" (click)="cancelLogout()">No</button>
        <button class="btn-confirm" (click)="confirmLogout()">Yes</button>
      </div>
    </div>
  </div>

</div>
