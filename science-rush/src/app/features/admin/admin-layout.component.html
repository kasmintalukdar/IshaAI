<div class="admin-container">
  <aside class="admin-sidebar">
    <div class="brand">
      <h2>🧪 Lab Admin</h2>
    </div>
    
    <nav>
      <a routerLink="streams" routerLinkActive="active">
        <span>📊</span> Streams
      </a>
      <a routerLink="subjects" routerLinkActive="active">
        <span>📚</span> Subjects
      </a>
      <a routerLink="chapters/new" routerLinkActive="active">
        <span>⚡</span> Add Chapter
      </a>
      <div class="separator"></div>
      <a (click)="logout()">
        <span>🚪</span> Logout
      </a>
    </nav>
  </aside>

  <main class="admin-content">
    <router-outlet></router-outlet>
  </main>
</div>
